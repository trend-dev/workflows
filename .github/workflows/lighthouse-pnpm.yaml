name: lighthouse perf budget
run-name: Generate LH report from [${{ github.head_ref || github.ref_name }}] branch

on:
    workflow_call:
        inputs:
            NODE_VERSION:
                type: string
                default: '22'
            RUNNER:
                type: string
                default: 'docker-runner-front'
            INSTALL_COMMAND:
                type: string
                default: 'pnpm run setup'
            BUILD_COMMAND:
                type: string
                default: 'pnpm run build'
            CHANGED_PATHS:
                type: string
                default: '^(src/|config/|index\.html|vite\.config\.mts|lighthouserc\.js|pnpm-lock\.yaml|\.github/workflows/lighthouse\.yml)'

jobs:
    Run_lighthouse:
        name: Lighthouse perf budget
        timeout-minutes: 20
        runs-on: ['${{ inputs.RUNNER }}']

        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Detect relevant changes
              id: changes
              env:
                  GH_TOKEN: ${{ github.token }}
                  REPO: ${{ github.repository }}
                  PR: ${{ github.event.pull_request.number }}
                  PATTERN: ${{ inputs.CHANGED_PATHS }}
              run: |
                  curl -fsSL -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/$REPO/pulls/$PR/files?per_page=100" > /tmp/pr-files.json || { echo "run=true" >> "$GITHUB_OUTPUT"; echo "Не удалось получить список файлов PR из GitHub API, запускаю аудит по умолчанию." >> "$GITHUB_STEP_SUMMARY"; exit 0; }
                  grep -oE '"filename": *"[^"]+"' /tmp/pr-files.json | sed 's/.*: *"//; s/"$//' > /tmp/pr-files.txt
                  cat /tmp/pr-files.txt
                  COUNT=$(wc -l < /tmp/pr-files.txt)
                  if [ "$COUNT" -ge 100 ]; then
                      echo "run=true" >> "$GITHUB_OUTPUT"
                  elif grep -qE "$PATTERN" /tmp/pr-files.txt; then
                      echo "run=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "run=false" >> "$GITHUB_OUTPUT"
                      echo "Аудит пропущен: изменения PR не затрагивают приложение." >> "$GITHUB_STEP_SUMMARY"
                  fi

            - name: Setup node
              id: node_build
              if: steps.changes.outputs.run == 'true'
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ inputs.NODE_VERSION }}
                  token: ${{ secrets.GPT_TOKEN }}
                  registry-url: 'https://npm.pkg.github.com'
                  check-latest: true

            - name: Use Corepack
              if: steps.changes.outputs.run == 'true'
              run: |
                  echo "corepack version => $(corepack --version)"
                  corepack enable
                  pnpm --version

            - uses: actions/cache@v5
              if: steps.changes.outputs.run == 'true'
              id: cache
              with:
                  path: ./node_modules
                  key: ${{ runner.os }}-node-${{ inputs.NODE_VERSION }}-${{ hashFiles('**/pnpm-lock.yaml') }}

            - name: Install dependencies
              if: steps.changes.outputs.run == 'true' && steps.cache.outputs.cache-hit != 'true'
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GPT_TOKEN }}
              run: ${{ inputs.INSTALL_COMMAND }}

            - name: Build
              if: steps.changes.outputs.run == 'true' && inputs.BUILD_COMMAND != ''
              run: ${{ inputs.BUILD_COMMAND }}

            - name: Change apt mirror
              if: steps.changes.outputs.run == 'true'
              run: |
                  if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
                      sudo sed -i 's|http://archive.ubuntu.com/ubuntu|http://mirror.yandex.ru/ubuntu|g' /etc/apt/sources.list.d/ubuntu.sources
                      sudo sed -i 's|http://security.ubuntu.com/ubuntu|http://mirror.yandex.ru/ubuntu|g' /etc/apt/sources.list.d/ubuntu.sources
                  else
                      echo "ubuntu.sources не найден, пропускаю смену apt-зеркала" >> "$GITHUB_STEP_SUMMARY"
                  fi

            - name: Install Chromium
              if: steps.changes.outputs.run == 'true'
              run: |
                  npx --yes playwright@1.61.1 install --with-deps chromium
                  CHROME=$(find $HOME/.cache/ms-playwright -type f -name chrome -path '*chrome-linux*' | sort -V | tail -1)
                  if [ -n "$CHROME" ]; then "$CHROME" --version; fi

            - name: Resolve Chrome path
              if: steps.changes.outputs.run == 'true'
              run: |
                  CHROME=$(find $HOME/.cache/ms-playwright -type f -name chrome -path '*chrome-linux*' | sort -V | tail -1)
                  if [ -z "$CHROME" ]; then
                      echo "Chromium не найден после установки" >&2
                      exit 1
                  fi
                  echo "CHROME_PATH=$CHROME" >> $GITHUB_ENV

            - name: Run Lighthouse CI
              if: steps.changes.outputs.run == 'true'
              run: |
                  echo "CHROME_PATH=$CHROME_PATH"
                  pnpm exec trend-lighthouse autorun

            - name: Build summary
              id: results
              if: always() && steps.changes.outputs.run == 'true'
              run: |
                  pnpm exec trend-lighthouse summary > lhci-summary.md || echo "❌ Прогон не завершился, смотреть лог. Если чекаут висел или был таймаут: блокировки TLS 1.3 к github.com (ТСПУ), перезапустить джобу." > lhci-summary.md
                  if [ -f lhci-reports/manifest.json ]; then echo "found=true" >> "$GITHUB_OUTPUT"; else echo "found=false" >> "$GITHUB_OUTPUT"; fi

            - name: Job summary
              if: always() && steps.changes.outputs.run == 'true'
              run: cat lhci-summary.md >> "$GITHUB_STEP_SUMMARY"

            - name: Keep median reports only
              if: always() && steps.results.outputs.found == 'true'
              run: pnpm exec trend-lighthouse prune

            - name: Upload reports
              id: artifacts
              if: always() && steps.results.outputs.found == 'true'
              uses: actions/upload-artifact@v4
              with:
                  name: lighthouse-reports-pr${{ github.event.pull_request.number }}-${{ github.run_number }}
                  path: lhci-reports/
                  retention-days: 14

            - name: PR comment
              if: always() && steps.changes.outputs.run == 'true'
              continue-on-error: true
              uses: actions/github-script@v9
              env:
                  ARTIFACT_ID: ${{ steps.artifacts.outputs.artifact-id }}
                  RESULTS_FOUND: ${{ steps.results.outputs.found }}
              with:
                  script: |
                      const fs = require('fs');
                      const marker = '<!-- lighthouse-perf-budget -->';
                      const found = process.env.RESULTS_FOUND === 'true';
                      const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
                      const comments = await github.paginate(github.rest.issues.listComments, {
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          per_page: 100
                      });
                      const existing = comments.find(c => c.body && c.body.startsWith(marker));
                      let body;
                      if (found) {
                          const summary = fs.readFileSync('lhci-summary.md', 'utf8').trim();
                          const artifactId = process.env.ARTIFACT_ID;
                          const reportsUrl = artifactId ? `${runUrl}/artifacts/${artifactId}` : runUrl;
                          body = `${marker}\n${summary}\n\n[Отчеты](${reportsUrl})`;
                      } else if (existing) {
                          body = `${marker}\n### ⚡ Lighthouse perf budget ❌\n\nПоследний прогон не завершился, смотреть [лог](${runUrl}).\n\n<sub>Если чекаут висел или был таймаут: блокировки TLS 1.3 к github.com (ТСПУ), перезапустить джобу.</sub>`;
                      } else {
                          return;
                      }
                      if (existing) {
                          await github.rest.issues.updateComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              comment_id: existing.id,
                              body
                          });
                      } else {
                          await github.rest.issues.createComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: context.issue.number,
                              body
                          });
                      }
