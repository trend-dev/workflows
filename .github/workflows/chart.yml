name: Make Release Chart

on:
  workflow_call:
    inputs:
      APP_NAME:
        description: 'Application name'
        type: string
        required: true
      APP_VERSION:
        description: 'Application version'
        type: string
        required: true
      CHART_FOLDER:
        description: 'Path to Helm chart directory'
        type: string
        required: true
      DOCKER_REGISTRY:
        description: 'Docker registry for Helm chart storage'
        type: string
        required: false
        default: 'docker-registry.trendagent.ru:5000'
    secrets:
      DOCKER_REGISTRY_USER:
        required: true
      DOCKER_REGISTRY_PASSWORD:
        required: true

jobs:
  chart:
    name: 'Create Helm chart release'
    runs-on: docker-runner
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 'Install Helm'
        uses: azure/setup-helm@v5
        with:
          version: v3.14.3

      - name: 'Login to Docker registry'
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: 'Update chart values'
        uses: trend-dev/inplace-envsubst-action@main
        env:
          APP_NAME: ${{ inputs.APP_NAME }}
          APP_VERSION: ${{ inputs.APP_VERSION }}
        with:
          working-directory: ${{ inputs.CHART_FOLDER }}
          fail_on_missing_variables: 'true'
          search_input: |
            {
              "patterns": [".yaml"],
              "files": ["Chart.yaml"],
              "depth": 1
            }

      - name: 'Package & publish Helm chart'
        run: |
          cd ${{ inputs.CHART_FOLDER }}
          helm registry login -u ${{ secrets.DOCKER_REGISTRY_USER }} -p ${{ secrets.DOCKER_REGISTRY_PASSWORD }} ${{ inputs.DOCKER_REGISTRY }}
          helm package ./
          helm push ${{ inputs.APP_NAME }}-${{ inputs.APP_VERSION }}.tgz \
            oci://${{ inputs.DOCKER_REGISTRY }}/helm-charts
