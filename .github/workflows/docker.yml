name: Docker

on:
  workflow_call:
    inputs:
      APP_NAME:
        type: string
        required: true
      APP_VERSION:
        type: string
        required: true
      BUILD:
        description: "Actual boolean flag to make build docker image, BUT BEWARE IT IS PASSING AS STRING"
        type: string
        required: false
        default: true
      DOCKERFILE:
        description: "Dockerfile path relative to context"
        type: string
        required: false
        default: "./tools/Dockerfile"
      CONTEXT:
        description: "Context for dockerfile"
        type: string
        required: false
        default: "."
      DOCKER_REGISTRY:
        description: "Docker registry to push image"
        type: string
        required: false
        default: "docker-registry.trendagent.ru:5000"
      EXTRA_BUILD_ARGS:
        description: |
          Дополнительные build-arg в формате
          KEY1=VAL1
          KEY2=VAL2
        type: string
        required: false
        default: ""
      CACHE_ENABLED:
        description: "Cache for docker"
        type: string
        required: false
        default: "true"
    outputs:
      IMAGE:
        description: "Docker image name"
        value: ${{ jobs.variables.outputs.IMAGE }}
    secrets:
      DOCKER_REGISTRY_USER:
        required: true
      DOCKER_REGISTRY_PASSWORD:
        required: true
      GPT_TOKEN:
        required: true

jobs:
  variables:
    name: Prepare variables
    runs-on: docker-runner
    outputs:
      IMAGE: ${{ steps.image.outputs.NAME }}
      BUILD: ${{ steps.build.outputs.BUILD }}
    steps:
      - id: image
        run: echo "NAME=${{ inputs.DOCKER_REGISTRY }}/${{ inputs.APP_NAME }}:${{ inputs.APP_VERSION }}-${{ github.sha }}" >> $GITHUB_OUTPUT
      - id: build
        run: echo "BUILD=${{ inputs.BUILD == '' && 'true' || inputs.BUILD }}" >> $GITHUB_OUTPUT

  build:
    if: needs.variables.outputs.BUILD == 'true'
    name: Build & push docker image
    runs-on: docker-runner
    needs: variables
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest
      # Cache
      - name: Cache Docker layers
        if: inputs.CACHE_ENABLED == 'true'
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into Docker registry
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        if: inputs.CACHE_ENABLED == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.CONTEXT }}
          file: ${{ inputs.DOCKERFILE }}
          push: true
          tags: |
            ${{ inputs.DOCKER_REGISTRY }}/${{ inputs.APP_NAME }}:${{ github.sha }}
            ${{ needs.variables.outputs.IMAGE }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
          build-args: |
            NPM_TOKEN=${{ secrets.NPM_PACKAGES_READ }}
            ${{ inputs.EXTRA_BUILD_ARGS }}

      # for parsers-modules
      - name: Build without cache
        if: inputs.CACHE_ENABLED == 'false'
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.CONTEXT }}
          file: ${{ inputs.DOCKERFILE }}
          push: true
          tags: |
            ${{ inputs.DOCKER_REGISTRY }}/${{ inputs.APP_NAME }}:${{ github.sha }}
            ${{ needs.variables.outputs.IMAGE }}
          build-args: |
            NPM_TOKEN=${{ secrets.NPM_PACKAGES_READ }}
            ${{ inputs.EXTRA_BUILD_ARGS }}
          no-cache: true
