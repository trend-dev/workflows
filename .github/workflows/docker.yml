name: Docker

on:
  workflow_call:
    inputs:
      APP_NAME:
        description: 'Application name'
        type: string
        required: true
      APP_VERSION:
        description: 'Application version'
        type: string
        required: true
      BUILD:
        description: 'Boolean flag to build Docker image (passed as string)'
        type: string
        required: false
        default: 'true'
      DOCKERFILE:
        description: 'Dockerfile path relative to context'
        type: string
        required: false
        default: './tools/Dockerfile'
      CONTEXT:
        description: 'Build context for Dockerfile'
        type: string
        required: false
        default: '.'
      DOCKER_REGISTRY:
        description: 'Docker registry URL'
        type: string
        required: false
        default: 'docker-registry.trendagent.ru:5000'
      EXTRA_BUILD_ARGS:
        description: |
          Additional build-args in KEY=VALUE format,
          one per line
        type: string
        required: false
        default: ''
      CACHE_ENABLED:
        description: 'Enable Docker layer caching'
        type: string
        required: false
        default: 'true'
    outputs:
      IMAGE:
        description: 'Full Docker image name with tag'
        value: ${{ jobs.variables.outputs.IMAGE }}
    secrets:
      DOCKER_REGISTRY_USER:
        required: true
      DOCKER_REGISTRY_PASSWORD:
        required: true
      GPT_TOKEN:
        required: true

jobs:
  variables:
    name: 'Prepare variables'
    runs-on: docker-runner
    outputs:
      IMAGE: ${{ steps.image.outputs.NAME }}
      BUILD: ${{ steps.build.outputs.BUILD }}
    steps:
      - id: image
        run: |
          echo "NAME=${{ inputs.DOCKER_REGISTRY }}/${{ inputs.APP_NAME }}:${{ inputs.APP_VERSION }}-${{ github.sha }}" >> $GITHUB_OUTPUT
      - id: build
        run: |
          echo "BUILD=${{ inputs.BUILD == '' && 'true' || inputs.BUILD }}" >> $GITHUB_OUTPUT

  build:
    name: 'Build & push Docker image'
    if: needs.variables.outputs.BUILD == 'true'
    runs-on: docker-runner
    needs: variables
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v6

      - name: 'Setup Docker Buildx'
        id: buildx
        uses: docker/setup-buildx-action@v6
        with:
          version: latest
      # Cache
      - name: 'Cache Docker layers'
        if: ${{ inputs.CACHE_ENABLED == 'true' }}
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: 'Login to Docker registry'
        if: ${{ inputs.CACHE_ENABLED == 'true' || inputs.CACHE_ENABLED == 'false' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: 'Build & push with cache'
        if: ${{ inputs.CACHE_ENABLED == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.CONTEXT }}
          file: ${{ inputs.DOCKERFILE }}
          push: true
          tags: |
            ${{ inputs.DOCKER_REGISTRY }}/${{ inputs.APP_NAME }}:${{ github.sha }}
            ${{ needs.variables.outputs.IMAGE }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
          build-args: |
            NPM_TOKEN=${{ secrets.NPM_PACKAGES_READ }}
            ${{ inputs.EXTRA_BUILD_ARGS }}

      - name: 'Build & push without cache'
        if: ${{ inputs.CACHE_ENABLED == 'false' }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.CONTEXT }}
          file: ${{ inputs.DOCKERFILE }}
          push: true
          tags: |
            ${{ inputs.DOCKER_REGISTRY }}/${{ inputs.APP_NAME }}:${{ github.sha }}
            ${{ needs.variables.outputs.IMAGE }}
          build-args: |
            NPM_TOKEN=${{ secrets.NPM_PACKAGES_READ }}
            ${{ inputs.EXTRA_BUILD_ARGS }}
          no-cache: true
