name: Notification

on:
  workflow_call:
    inputs:
      APP_NAME:
        type: string
        required: false
      APP_VERSION:
        type: string
        required: false
      LOCATION:
        type: string
        required: false
    secrets:
      SLACK_WEBHOOK:
        required: true

jobs:

  pachcaNotificationPro:
    if: ${{ inputs.LOCATION == 'ta-production' }}
    name: Pachca Notification
    runs-on: [ docker-runner ]
    steps:
      - uses: actions/checkout@v7
      - name: Inject slug/short variables
        uses: rlespinasse/github-slug-action@v5

      - name: Notify Pachca production
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          STATUS: ${{ job.status }}
          ENVIRONMENT: "${{ inputs.LOCATION }}"
          USER: ${{ github.actor }}
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "message": "Пользователь: $USER\nОкружение: $ENVIRONMENT\nСтатус: $STATUS"
          }
          EOF
          )

          curl -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK"

  pachcaNotification:
    if: ${{ github.event.inputs.location != 'ta-production' }}
    name: Pachca Notification
    runs-on: [ docker-runner ]
    steps:
      - uses: actions/checkout@v7
      - name: Inject slug/short variables
        uses: rlespinasse/github-slug-action@v5

      - name: Notify Pachca
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          ENVIRONMENT: ${{ github.event.inputs.location || 'stage' }}
          BRANCH: ${{ env.GITHUB_REF_SLUG }}
          USER: ${{ github.actor }}
          APP_NAME: ${{ inputs.APP_NAME }}
          VERSION: ${{ inputs.APP_VERSION }}
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "message": "Пользователь: $USER\nОкружение: $ENVIRONMENT\nПриложение: $APP_NAME\nВерсия: $VERSION\nВетка: $BRANCH\n"
          }
          EOF
          )
          
          curl -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK"
